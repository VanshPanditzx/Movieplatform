<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MovieHub</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .form-container {
            background: #1a1a2e;
            padding: 40px;
            border-radius: 15px;
            max-width: 450px;
            margin: 80px auto;
            border: 1px solid #2a2a4a;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ddd;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-primary:hover {
            background: #c73652;
        }
        .message {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <h1>🎬 MovieHub</h1>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
    </div>
</nav>

<div class="form-container">
    <h2 style="text-align:center; color:#e94560; margin-bottom:25px;">📝 Register</h2>

    <form id="registerForm" autocomplete="off">
        <div class="form-group">
            <label>Username</label>
            <input type="text" 
                   id="username" 
                   placeholder="Choose a username"
                   autocomplete="off"
                   required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" 
                   id="email" 
                   placeholder="Enter your email"
                   autocomplete="off"
                   required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" 
                   id="password" 
                   placeholder="Enter password (min 4 characters)"
                   autocomplete="new-password"
                   required>
        </div>

        <div class="form-group">
            <label>Favorite Genre</label>
            <select id="genre" autocomplete="off">
                <option value="">Select Genre</option>
                <option value="Action">🔥 Action</option>
                <option value="Comedy">😂 Comedy</option>
                <option value="Drama">🎭 Drama</option>
                <option value="Horror">👻 Horror</option>
                <option value="Sci-Fi">🚀 Sci-Fi</option>
                <option value="Romance">❤️ Romance</option>
            </select>
        </div>

        <button type="button" class="btn-primary" onclick="registerUser()">
            Register
        </button>
    </form>

    <p style="text-align:center; margin-top:20px;">
        Already have an account? 
        <a href="login.html" style="color:#e94560;">Login Here</a>
    </p>

    <p id="message" class="message"></p>
</div>

<script>
    const API = "http://localhost:8080/api";  

    async function registerUser() {
        const username = document.getElementById("username").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const genre = document.getElementById("genre").value;
        const msg = document.getElementById("message");

      
        if (!username || !email || !password || !genre) {
            msg.innerHTML = `<span style="color:red">❌ Please fill all fields</span>`;
            return;
        }

        if (username.length < 3) {
            msg.innerHTML = `<span style="color:red">❌ Username must be at least 3 characters</span>`;
            return;
        }

        if (password.length < 4) {
            msg.innerHTML = `<span style="color:red">❌ Password must be at least 4 characters</span>`;
            return;
        }

        if (!email.includes("@")) {
            msg.innerHTML = `<span style="color:red">❌ Enter a valid email</span>`;
            return;
        }

        try {
            const res = await fetch(`${API}/users/register`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    username: username,
                    email: email,
                    password: password,
                    favoriteGenre: genre
                })
            });

            const data = await res.json();

            if (data.message === "Registered Successfully!") {
                msg.innerHTML = `<span style="color:#4caf50">✅ Account Created! Redirecting to login...</span>`;
                
                
                document.getElementById("username").value = "";
                document.getElementById("email").value = "";
                document.getElementById("password").value = "";
                document.getElementById("genre").value = "";

                setTimeout(() => {
                    window.location.href = "login.html";
                }, 1500);
            } else {
                msg.innerHTML = `<span style="color:red">❌ ${data.message}</span>`;
            }
        } catch (err) {
            console.error(err);
            msg.innerHTML = `<span style="color:red">❌ Server error. Is backend running?</span>`;
        }
    }

   
    window.onload = () => {
        document.getElementById("username").value = "";
        document.getElementById("email").value = "";
        document.getElementById("password").value = "";
        document.getElementById("genre").value = "";
       
        
        setTimeout(() => {
            document.getElementById("username").value = "";
            document.getElementById("email").value = "";
            document.getElementById("password").value = "";
            document.getElementById("genre").value = "";
        }, 500);
    };

   
    document.getElementById("password").addEventListener("keypress", function(e) {
        if (e.key === "Enter") registerUser();
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - MovieHub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <h1>🎬 MovieHub</h1>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="register.html">Register</a>
    </div>
</nav>

<div class="form-container">
    <h2>🔐 User Login</h2>

    <div class="form-group">
        <label>Email</label>
        <input type="email"
               id="email"
               placeholder="Enter your email">
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password"
               id="password"
               placeholder="Enter your password">
    </div>

    <button class="btn-primary"
            onclick="loginUser()">
        Login
    </button>

    <p style="text-align:center; margin-top:15px">
        Don't have account?
        <a href="register.html" style="color:#e94560">
            Register Here
        </a>
    </p>

    <p id="message" class="message"></p>
</div>

<script>
const API = "http://localhost:8080/api";

async function loginUser() {
    const email    = document.getElementById("email")
                             .value.trim();
    const password = document.getElementById("password")
                             .value.trim();

   
    if (!email || !password) {
        showMessage("❌ Please enter email and password!", "red");
        return;
    }

    try {
        console.log(" Sending Login Request:");
        console.log({
            email: email,
            password: password
        });

        const res = await fetch(`${API}/users/login`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email:    email,
                password: password
            })
        });

        const data = await res.json();
        console.log("📥 Response:", data);

        if (data.success === true && data.userId) {
            // Save user
            localStorage.setItem("userId",   data.userId);
            localStorage.setItem("username", data.username);
            localStorage.setItem("email",    data.email);
            localStorage.setItem("genre",    data.genre);

            console.log("✅ Login Success! UserId:", data.userId);

            showMessage("✅ Login Successful! Welcome " +
                        data.username, "green");

            setTimeout(() => {
                window.location.href = "index.html";
            }, 1000);

        } else {
            console.log("❌ Login Failed:", data.message);
            showMessage("❌ " + data.message, "red");
        }

    } catch (err) {
        console.error("❌ Error:", err);
        showMessage(
            "❌ Server Error! Is Spring Boot running on port 8080?",
            "red"
        );
    }
}

function showMessage(msg, color) {
    const el = document.getElementById("message");
    el.textContent = msg;
    el.style.color = color;
}

// Login 
document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("password")
            .addEventListener("keypress", (e) => {
        if (e.key === "Enter") loginUser();
    });
});
</script>
</body>
</html>
